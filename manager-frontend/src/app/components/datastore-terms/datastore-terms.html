<div class="page-container">
    <div class="header-row">
        <button mat-icon-button (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h1>Setting up Datastore Terms from Ontology</h1>
    </div>

    <mat-card class="form-card">
        <mat-card-content>
            <form [formGroup]="termsForm" (ngSubmit)="onSubmit()" class="relative-container">
                <!-- ... form contents ... -->
                <div class="form-row">
                    <mat-form-field appearance="outline" class="class-field">
                        <mat-label>Classname</mat-label>
                        <input matInput formControlName="classname" placeholder="Ex. dataset:DataTypeComponent">
                        <mat-icon matSuffix>class</mat-icon>
                        <mat-error *ngIf="termsForm.get('classname')?.hasError('required')">
                            Classname is required
                        </mat-error>
                    </mat-form-field>

                    <mat-form-field appearance="outline" class="type-field">
                        <mat-label>Datatype</mat-label>
                        <input matInput formControlName="datatype" placeholder="Ex. xsd:string">
                        <mat-icon matSuffix>data_object</mat-icon>
                        <mat-error *ngIf="termsForm.get('datatype')?.hasError('required')">
                            Datatype is required
                        </mat-error>
                    </mat-form-field>

                    <div class="checkbox-container">
                        <mat-checkbox formControlName="writeToDatastore" matTooltip="Write to Datastore">
                        </mat-checkbox>
                    </div>

                    <div class="inline-actions">
                        <button mat-mini-fab color="primary" type="submit" [disabled]="!termsForm.valid || isLoading"
                            matTooltip="Save Terms">
                            <mat-icon>save</mat-icon>
                        </button>
                        <button mat-mini-fab color="warn" type="button" (click)="goBack()" [disabled]="isLoading"
                            matTooltip="Cancel">
                            <mat-icon>cancel</mat-icon>
                        </button>
                    </div>
                </div>

                <div *ngIf="isLoading" class="loading-overlay">
                    <mat-spinner diameter="40"></mat-spinner>
                </div>
            </form>

            <div *ngIf="termsList.length > 0" class="terms-matrix-container mat-elevation-z2">
                <h3>Terms Matrix</h3>
                <div class="table-scroll">
                    <table mat-table [dataSource]="termsList" class="full-width-table">
                        <ng-container matColumnDef="term">
                            <th mat-header-cell *matHeaderCellDef>Term</th>
                            <td mat-cell *matCellDef="let element">{{element.term}}</td>
                        </ng-container>

                        <ng-container matColumnDef="description">
                            <th mat-header-cell *matHeaderCellDef>Description</th>
                            <td mat-cell *matCellDef="let element">{{element.description}}</td>
                        </ng-container>

                        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
                        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
                    </table>
                </div>
            </div>

            <div *ngIf="sanitizedMessage" class="response-panel"
                [ngClass]="{'success': isSuccessful, 'error': !isSuccessful}">
                <h3>Service Response</h3>
                <div class="rendered-content" [innerHTML]="sanitizedMessage"></div>
            </div>
        </mat-card-content>
    </mat-card>
</div>
